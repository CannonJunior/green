green:
  # Display name used in responses
  name: junior
  # Default location used by /best when no location is given in the command
  location: "Arlington, VA"

signal:
  # TCP address of the signal-cli daemon started with:
  #   signal-cli -a <account> daemon --tcp 127.0.0.1:7583
  daemon: "127.0.0.1:7583"
  # Only messages from these numbers are processed. All others are silently dropped.
  # Format: E.164, e.g. "+15555550100"
  approved_numbers: ["+17034708124"]

# Kept for future use if OpenClaw Gateway is needed (e.g. other channels)
openclaw:
  gateway: "ws://127.0.0.1:18789"
  workspace: "./workspace"

# Kept for future reference if iMessage is ever revisited
imessage:
  approved_numbers: []

projects:
  - name: green
    path: /home/junior/src/green
    description: "The Green AI assistant itself"
  - name: best
    path: /home/junior/src/best
    description: "Shows the best things occurring at the present location"
  - name: bets
    path: /home/junior/src/bets
    description: "Provides financial market summaries"
  - name: chew
    path: /home/junior/src/chew
    description: "All things food to chew on"
  - name: warchief
    path: /home/junior/src/warchief
    description: "A browser based 3D game where you are the Warchief"
  - name: decor
    path: /home/junior/src/decor
    description: "A browser application for the home"
  - name: red
    path: /home/junior/src/red
    description: "Robobrain"
  - name: yellow
    path: /home/junior/src/yellow
    description: "Private"
  - name: blue
    path: /home/junior/src/blue
    description: "Framework for iOS application to integrate with Siri and iOS"
  - name: log
    path: /home/junior/src/log
    description: "Personal log with image and GPS support"
  - name: trip
    path: /home/junior/src/trip
    description: "Plans round-trip flights, lodging, and rental cars between zip codes"
  - name: alpha
    path: /home/junior/src/alpha
    description: "Earnings breakout analyzer — scores stocks on revenue acceleration, margin expansion, and EPS beats"

claude_code:
  # Path to the claude CLI binary. Defaults to $PATH lookup.
  binary: /home/junior/.nvm/versions/node/v22.19.0/bin/claude
  # Kill the claude process after this many milliseconds
  timeout_ms: 300000
  # Split responses longer than this into multiple iMessages
  chunk_size: 3800
  # Project name used when user doesn't specify one
  default_project: green
  # Pass --dangerously-skip-permissions so Claude Code runs non-interactively.
  # Set to false if you want to review tool use requests manually.
  skip_permissions: true

inference:
  # Anthropic model used for the Green agent itself
  model: claude-sonnet-4-6
  max_tokens: 8192

chew:
  # Base URL of the running Chew web app
  url: "http://localhost:8983"

mobile:
  # Port the Blue iOS app connects to. Start Green with: npm run dev -- --channel mobile
  port: 9002
  # Generate a strong token with: openssl rand -hex 32
  token: "change-me-to-a-long-random-string"
