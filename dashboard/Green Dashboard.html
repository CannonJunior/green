// LEFT: full chat thread (scrollable). User bubbles + Green response cards.
// CENTER: when a Green response is selected → its full markdown content.
// RIGHT: trace (services called in order, with caps/limits/risk + per-step latency
//        and tokens), plus today's service-health overview underneath.

const { useState, useMemo, useRef, useEffect } = React;

const TIER_COLOR = { free: "var(--tier-free)", pro: "var(--tier-pro)", paid: "var(--tier-paid)" };
const RISK_COLOR = { low: "var(--g-4)", med: "var(--amber)", high: "var(--red)" };

function fmtTime(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  const hh = ((h + 11) % 12) + 1;
  return `${hh}:${String(m).padStart(2, "0")} ${ampm}`;
}
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}

function WebDashboard({ tweaks, signalApi }) {
  const data = window.GREEN_DATA;
  const [selected, setSelected] = useState("m010"); // default to ALPHA
  const [filter, setFilter] = useState("");

  const messages = data.conversation;
  const greenById = useMemo(() => Object.fromEntries(messages.filter(m => m.role === "green").map(m => [m.id, m])), [messages]);
  const sel = greenById[selected];

  const filtered = filter
    ? messages.filter(m => (m.text || m.title || (m.blocks || []).map(b => b.text || "").join(" ") || m.cmd || "").toLowerCase().includes(filter.toLowerCase()))
    : messages;

  return (
    <div style={{ width: "100%", height: "100%", background: "var(--bg-0)", color: "var(--ink-1)", display: "grid", gridTemplateColumns: "440px 1fr 380px", gridTemplateRows: "44px 1fr", overflow: "hidden" }}>
      {/* top bar — full width */}
      <TopBar filter={filter} setFilter={setFilter} />

      {/* LEFT — chat thread */}
      <ChatThread messages={filtered} selected={selected} onSelect={setSelected} />

      {/* CENTER — selected response */}
      <ResponseDetail msg={sel} userMsg={messages.find(m => m.id === sel?.parent)} signalApi={signalApi} />

      {/* RIGHT — trace + service health */}
      <RightRail msg={sel} />
    </div>
  );
}

function TopBar({ filter, setFilter }) {
  return (
    <div style={{ gridColumn: "1 / -1", borderBottom: "1px solid var(--line)", background: "var(--bg-1)", display: "flex", alignItems: "center", padding: "0 16px", gap: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 10, height: 10, borderRadius: 2, background: "var(--g-4)", boxShadow: "0 0 12px var(--g-4)" }}></div>
        <span style={{ fontFamily: "var(--mono)", fontWeight: 600, letterSpacing: ".06em", color: "var(--g-6)" }}>GREEN</span>
        <span className="dim mono" style={{ fontSize: 11 }}>signal · web · cli</span>
      </div>
      <div style={{ flex: 1 }}></div>
      <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="filter conversation…"
        style={{ background: "var(--bg-2)", border: "1px solid var(--line)", color: "var(--ink-1)", borderRadius: 3, padding: "5px 10px", fontFamily: "var(--mono)", fontSize: 12, width: 240, outline: "none" }} />
      <span className="dim mono" style={{ fontSize: 11 }}>{fmtDate(Date.now())}</span>
    </div>
  );
}

function ChatThread({ messages, selected, onSelect }) {
  const ref = useRef(null);
  return (
    <div style={{ borderRight: "1px solid var(--line)", background: "var(--bg-1)", display: "flex", flexDirection: "column", minHeight: 0 }}>
      <div style={{ padding: "10px 16px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--ink-3)", letterSpacing: ".1em", textTransform: "uppercase" }}>Signal · #green</span>
        <span style={{ flex: 1 }}></span>
        <span className="chip ok"><span className="dot pro"></span>linked</span>
      </div>
      <div ref={ref} className="scroll" style={{ flex: 1, overflow: "auto", padding: "16px 14px", display: "flex", flexDirection: "column", gap: 10 }}>
        {messages.map((m, i) => {
          const prev = messages[i-1];
          const showDay = !prev || new Date(prev.ts).toDateString() !== new Date(m.ts).toDateString();
          return (
            <React.Fragment key={m.id}>
              {showDay && <DayDivider ts={m.ts} />}
              {m.role === "user"
                ? <UserBubble msg={m} />
                : <GreenBubble msg={m} active={m.id === selected} onClick={() => onSelect(m.id)} />}
            </React.Fragment>
          );
        })}
      </div>
      <div style={{ borderTop: "1px solid var(--line)", padding: "10px 14px", background: "var(--bg-2)", display: "flex", alignItems: "center", gap: 8 }}>
        <span className="dim mono" style={{ fontSize: 11 }}>›</span>
        <span className="dim mono" style={{ fontSize: 12, opacity: .6 }}>type a slash command or "#api …"</span>
      </div>
    </div>
  );
}

function DayDivider({ ts }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "8px 0 2px" }}>
      <div style={{ flex: 1, height: 1, background: "var(--line)" }}></div>
      <span className="mono" style={{ fontSize: 10, color: "var(--ink-4)", letterSpacing: ".1em" }}>{fmtDate(ts).toUpperCase()}</span>
      <div style={{ flex: 1, height: 1, background: "var(--line)" }}></div>
    </div>
  );
}

function UserBubble({ msg }) {
  return (
    <div style={{ alignSelf: "flex-end", maxWidth: "78%" }}>
      <div style={{ background: "var(--g-3)", color: "var(--g-6)", padding: "8px 12px", borderRadius: "12px 12px 2px 12px", fontFamily: "var(--mono)", fontSize: 12.5, lineHeight: 1.5, wordBreak: "break-word" }}>
        {msg.text}
      </div>
      <div className="mono dim2" style={{ fontSize: 10, textAlign: "right", marginTop: 2 }}>{fmtTime(msg.ts)}</div>
    </div>
  );
}

function GreenBubble({ msg, active, onClick }) {
  const previewText = (msg.title || (msg.blocks && (msg.blocks[0]?.text || (msg.blocks[0]?.items || [])[0])) || msg.cmd || "");
  return (
    <div onClick={onClick} style={{ alignSelf: "flex-start", maxWidth: "92%", cursor: "pointer", outline: active ? "1px solid var(--g-4)" : "none", borderRadius: "12px 12px 12px 2px" }}>
      <div style={{ background: active ? "var(--bg-3)" : "var(--bg-2)", border: "1px solid " + (active ? "var(--g-3)" : "var(--line)"), padding: "10px 12px", borderRadius: "12px 12px 12px 2px", transition: "all .15s" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
          <span className="mono" style={{ fontSize: 11, fontWeight: 600, color: "var(--g-5)", letterSpacing: ".05em" }}>GREEN</span>
          <span className={"chip " + (msg.channel === "pro" ? "pro" : "api")}>{msg.channel === "pro" ? "Pro" : "API"}</span>
          {msg.bug && <span className="chip fail" title={msg.bug.description}>● bug</span>}
          <span style={{ flex: 1 }}></span>
          <span className="mono dim2" style={{ fontSize: 10 }}>{(msg.latencyMs/1000).toFixed(1)}s · {msg.tokens.toLocaleString()}t</span>
        </div>
        <div style={{ fontFamily: "var(--mono)", fontSize: 12.5, color: "var(--ink-1)", lineHeight: 1.5, fontWeight: 600, marginBottom: 4, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {previewText}
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
          {msg.trace.map((t, i) => (
            <ServicePill key={i} svc={window.GREEN_DATA.svcMap[t.svc]} compact />
          ))}
        </div>
      </div>
      <div className="mono dim2" style={{ fontSize: 10, marginTop: 2, marginLeft: 4 }}>{fmtTime(msg.ts)}</div>
    </div>
  );
}

function ServicePill({ svc, compact, active, onClick }) {
  if (!svc) return null;
  return (
    <span onClick={onClick} style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      padding: compact ? "1px 7px" : "3px 9px",
      borderRadius: 3,
      fontFamily: "var(--mono)", fontSize: compact ? 10.5 : 11.5,
      background: active ? "var(--bg-4)" : "var(--bg-3)",
      border: "1px solid " + (active ? TIER_COLOR[svc.tier] : "var(--line)"),
      color: "var(--ink-2)",
      cursor: onClick ? "pointer" : "default",
      whiteSpace: "nowrap",
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 1, background: TIER_COLOR[svc.tier] }}></span>
      {svc.name}
    </span>
  );
}

// ── center: full Green response with the actual markdown-ish content ──
function ResponseDetail({ msg, userMsg, signalApi }) {
  if (!msg) return <div style={{ background: "var(--bg-0)" }}></div>;
  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: 0, background: "var(--bg-0)" }}>
      <div style={{ padding: "10px 20px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 10 }}>
        <span className="mono" style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: ".1em", textTransform: "uppercase" }}>Response</span>
        <span className="mono" style={{ fontSize: 12, color: "var(--g-5)", fontWeight: 600 }}>{msg.cmd}</span>
        <span className="dim mono" style={{ fontSize: 11 }}>{userMsg?.text}</span>
        <span style={{ flex: 1 }}></span>
        <button onClick={() => signalApi.sendRun(msg)} style={{
          all: "unset", cursor: "pointer", fontFamily: "var(--mono)", fontSize: 11,
          padding: "5px 12px", borderRadius: 3, background: "var(--g-3)", color: "var(--g-6)",
          border: "1px solid var(--g-4)",
        }}>resend → signal</button>
      </div>
      <div className="scroll" style={{ flex: 1, overflow: "auto", padding: "20px 28px" }}>
        <ResponseBody msg={msg} />
        {msg.bug && <BugCallout bug={msg.bug} />}
        <Stats msg={msg} />
      </div>
    </div>
  );
}

function ResponseBody({ msg }) {
  return (
    <div style={{ fontFamily: "var(--mono)", fontSize: 13.5, lineHeight: 1.65, color: "var(--ink-1)" }}>
      {msg.title && <h2 style={{ fontFamily: "var(--mono)", fontSize: 16, color: "var(--g-6)", margin: "0 0 14px", letterSpacing: ".02em", fontWeight: 700 }}>{msg.title}</h2>}
      {msg.blocks.map((b, i) => <Block key={i} b={b} />)}
    </div>
  );
}

function Block({ b }) {
  if (b.kind === "h2") return <h3 style={{ fontFamily: "var(--mono)", fontSize: 13, color: "var(--g-5)", letterSpacing: ".1em", textTransform: "uppercase", margin: "20px 0 8px", fontWeight: 600 }}>{b.text}</h3>;
  if (b.kind === "h3") return <h4 style={{ fontFamily: "var(--mono)", fontSize: 11.5, color: "var(--g-4)", letterSpacing: ".15em", textTransform: "uppercase", margin: "16px 0 6px", fontWeight: 600 }}>{b.text}</h4>;
  if (b.kind === "p")  return <p style={{ margin: "0 0 10px", color: "var(--ink-1)" }}>{b.text}</p>;
  if (b.kind === "list") return (
    <ul style={{ margin: "0 0 10px", paddingLeft: 0, listStyle: "none" }}>
      {b.items.map((it, i) => (
        <li key={i} style={{ display: "flex", gap: 10, padding: "3px 0" }}>
          <span style={{ color: "var(--g-4)" }}>›</span>
          <span style={{ flex: 1 }}>{it}</span>
        </li>
      ))}
    </ul>
  );
  if (b.kind === "kv") return (
    <div style={{ display: "grid", gridTemplateColumns: "120px 1fr", rowGap: 4, columnGap: 16, margin: "0 0 10px" }}>
      {b.items.map(([k, v], i) => (
        <React.Fragment key={i}>
          <div style={{ color: "var(--g-5)" }}>{k}:</div>
          <div style={{ color: "var(--ink-2)" }}>{v}</div>
        </React.Fragment>
      ))}
    </div>
  );
  if (b.kind === "sources") return (
    <div style={{ marginTop: 12, padding: "10px 12px", border: "1px dashed var(--line-2)", borderRadius: 4, background: "var(--bg-1)" }}>
      <div style={{ fontFamily: "var(--mono)", fontSize: 10.5, color: "var(--ink-3)", letterSpacing: ".15em", textTransform: "uppercase", marginBottom: 6 }}>Sources</div>
      {b.items.map((s, i) => (
        <div key={i} style={{ fontSize: 11.5, color: "var(--ink-2)", padding: "2px 0", wordBreak: "break-all" }}>
          <span style={{ color: "var(--ink-4)" }}>[{i+1}]</span> {s}
        </div>
      ))}
    </div>
  );
  return null;
}

function BugCallout({ bug }) {
  return (
    <div style={{ marginTop: 16, padding: "10px 12px", border: "1px solid var(--red-d)", background: "rgba(255,107,91,.06)", borderRadius: 4, fontFamily: "var(--mono)", fontSize: 12, color: "var(--ink-2)" }}>
      <span className="chip fail" style={{ marginRight: 8 }}>{bug.severity || "bug"}</span>
      {bug.description}
    </div>
  );
}

function Stats({ msg }) {
  return (
    <div style={{ marginTop: 24, paddingTop: 16, borderTop: "1px dashed var(--line)", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
      <Stat label="latency" value={`${(msg.latencyMs/1000).toFixed(2)}s`} />
      <Stat label="tokens" value={msg.tokens.toLocaleString()} />
      <Stat label="cost" value={msg.cost === 0 ? "free" : `$${msg.cost.toFixed(4)}`} accent={msg.cost > 0 ? "amber" : "g"} />
      <Stat label="confidence" value={`${msg.confidence}%`} />
    </div>
  );
}

function Stat({ label, value, accent }) {
  const color = accent === "amber" ? "var(--amber)" : "var(--g-5)";
  return (
    <div>
      <div className="mono" style={{ fontSize: 10, color: "var(--ink-4)", letterSpacing: ".15em", textTransform: "uppercase" }}>{label}</div>
      <div className="mono" style={{ fontSize: 18, color, fontWeight: 600, marginTop: 4 }}>{value}</div>
    </div>
  );
}

// ── right rail: per-response trace, then service-health overview ──
function RightRail({ msg }) {
  return (
    <div style={{ borderLeft: "1px solid var(--line)", background: "var(--bg-1)", display: "flex", flexDirection: "column", minHeight: 0 }}>
      {msg && <TraceView msg={msg} />}
      <ServiceHealth />
    </div>
  );
}

function TraceView({ msg }) {
  const total = msg.trace.reduce((a, t) => a + t.t, 0);
  return (
    <div style={{ borderBottom: "1px solid var(--line)" }}>
      <div style={{ padding: "10px 16px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 8 }}>
        <span className="mono" style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: ".1em", textTransform: "uppercase" }}>Processing trace</span>
        <span style={{ flex: 1 }}></span>
        <span className="mono dim2" style={{ fontSize: 10 }}>{msg.trace.length} steps · {(total/1000).toFixed(2)}s</span>
      </div>
      <div className="scroll" style={{ maxHeight: 360, overflow: "auto", padding: "8px 8px" }}>
        {msg.trace.map((t, i) => {
          const svc = window.GREEN_DATA.svcMap[t.svc];
          const pct = total ? Math.max(2, Math.round(t.t / total * 100)) : 0;
          return (
            <div key={i} style={{ padding: "8px 10px", borderRadius: 4, marginBottom: 4, background: i % 2 ? "transparent" : "rgba(255,255,255,.012)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span className="mono" style={{ fontSize: 10, color: "var(--ink-4)", width: 16 }}>{String(i+1).padStart(2, "0")}</span>
                <ServicePill svc={svc} compact />
                <span style={{ flex: 1 }}></span>
                <span className="mono dim2" style={{ fontSize: 10 }}>{t.t}ms</span>
              </div>
              <div style={{ marginLeft: 24 }}>
                <div className="mono" style={{ fontSize: 11.5, color: "var(--ink-2)", marginBottom: 4 }}>{t.step}</div>
                <div style={{ height: 3, background: "var(--bg-3)", borderRadius: 2, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: pct + "%", background: TIER_COLOR[svc?.tier || "free"] }}></div>
                </div>
                <div style={{ display: "flex", gap: 12, marginTop: 4 }}>
                  <span className="mono dim2" style={{ fontSize: 10 }}>cap: <span style={{ color: "var(--ink-3)" }}>{svc?.cap}</span></span>
                  <span className="mono dim2" style={{ fontSize: 10 }}>limit: <span style={{ color: "var(--ink-3)" }}>{svc?.limit}</span></span>
                  <span className="mono dim2" style={{ fontSize: 10 }}>risk: <span style={{ color: RISK_COLOR[svc?.risk] }}>●</span></span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ServiceHealth() {
  const data = window.GREEN_DATA;
  const tally = {};
  data.conversation.filter(m => m.role === "green").forEach(m => {
    m.trace.forEach(t => {
      tally[t.svc] = tally[t.svc] || { calls: 0, ms: 0, tok: 0 };
      tally[t.svc].calls++;
      tally[t.svc].ms += t.t;
      tally[t.svc].tok += t.tokens;
    });
  });
  const rows = data.SERVICES.map(s => ({ svc: s, ...(tally[s.id] || { calls: 0, ms: 0, tok: 0 }) }))
    .sort((a, b) => b.calls - a.calls);
  return (
    <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "10px 16px", borderBottom: "1px solid var(--line)" }}>
        <span className="mono" style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: ".1em", textTransform: "uppercase" }}>Service health · today</span>
      </div>
      <div className="scroll" style={{ flex: 1, overflow: "auto", padding: "4px 0" }}>
        {rows.map((r, i) => (
          <div key={r.svc.id} style={{ display: "grid", gridTemplateColumns: "12px 1fr 50px 50px", alignItems: "center", gap: 8, padding: "6px 16px", borderBottom: "1px solid rgba(255,255,255,.02)" }}>
            <span style={{ width: 6, height: 6, borderRadius: 1, background: TIER_COLOR[r.svc.tier] }}></span>
            <div style={{ minWidth: 0 }}>
              <div className="mono" style={{ fontSize: 11.5, color: r.calls ? "var(--ink-1)" : "var(--ink-4)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.svc.name}</div>
              <div className="mono dim2" style={{ fontSize: 9.5, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.svc.cap}</div>
            </div>
            <div className="mono" style={{ fontSize: 11, color: "var(--ink-3)", textAlign: "right" }}>{r.calls || "—"}</div>
            <div className="mono" style={{ fontSize: 10, color: "var(--ink-4)", textAlign: "right" }}>{r.ms ? r.ms + "ms" : ""}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

window.WebDashboard = WebDashboard;

</script>

<script type="text/babel">
// CLI / TUI mirror — same conversation, keyboard-driven.
// Top: scrollable transcript (matches the user's pasted style exactly).
// Bottom: trace pane for the selected Green response.
// j/k navigate Green responses, enter to expand, s to send to signal,
// / filter, q reset filter.

const { useState, useEffect, useMemo, useRef } = React;

const CLI_BG = "#06090b";
const CLI_FG = "#cfe9d8";
const CLI_DIM = "#5b7768";
const CLI_GREEN = "#7ee8b0";
const CLI_AMBER = "#f0b341";
const CLI_RED = "#ff6b5b";

function CliDashboard({ signalApi }) {
  const data = window.GREEN_DATA;
  const messages = data.conversation;
  const greenIds = useMemo(() => messages.filter(m => m.role === "green").map(m => m.id), [messages]);
  const [selectedIdx, setSelectedIdx] = useState(greenIds.indexOf("m010") >= 0 ? greenIds.indexOf("m010") : 0);
  const [filter, setFilter] = useState("");
  const [filterMode, setFilterMode] = useState(false);
  const [flash, setFlash] = useState("");
  const [expanded, setExpanded] = useState({});
  const containerRef = useRef(null);
  const transcriptRef = useRef(null);
  const selectedMsg = messages.find(m => m.id === greenIds[selectedIdx]);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const onKey = (e) => {
      if (filterMode) {
        if (e.key === "Enter" || e.key === "Escape") {
          setFilterMode(false); e.preventDefault();
        }
        return;
      }
      const k = e.key.toLowerCase();
      if (k === "j") { setSelectedIdx(i => Math.min(greenIds.length - 1, i + 1)); e.preventDefault(); }
      else if (k === "k") { setSelectedIdx(i => Math.max(0, i - 1)); e.preventDefault(); }
      else if (k === "g") { setSelectedIdx(0); e.preventDefault(); }
      else if (e.shiftKey && e.key === "G") { setSelectedIdx(greenIds.length - 1); e.preventDefault(); }
      else if (k === "enter") {
        const id = greenIds[selectedIdx];
        setExpanded(x => ({ ...x, [id]: !x[id] }));
        e.preventDefault();
      }
      else if (k === "s" && selectedMsg) {
        signalApi.sendRun(selectedMsg);
        setFlash(`signal ← ${selectedMsg.cmd}`);
        e.preventDefault();
      }
      else if (k === "/") { setFilterMode(true); e.preventDefault(); }
      else if (k === "q") { setFilter(""); e.preventDefault(); }
    };
    el.addEventListener("keydown", onKey);
    return () => el.removeEventListener("keydown", onKey);
  }, [greenIds, selectedIdx, selectedMsg, signalApi, filterMode]);

  useEffect(() => {
    if (flash) { const t = setTimeout(() => setFlash(""), 1600); return () => clearTimeout(t); }
  }, [flash]);

  useEffect(() => {
    const node = transcriptRef.current?.querySelector(`[data-id="${greenIds[selectedIdx]}"]`);
    if (node) node.scrollIntoView({ block: "nearest" });
  }, [selectedIdx, greenIds]);

  const filtered = filter
    ? messages.filter(m => (m.text || m.title || (m.blocks||[]).map(b=>b.text||"").join(" ") || "").toLowerCase().includes(filter.toLowerCase()))
    : messages;

  return (
    <div ref={containerRef} tabIndex={0}
      onClick={() => containerRef.current?.focus()}
      style={{
        width: "100%", height: "100%", background: CLI_BG, color: CLI_FG,
        fontFamily: "var(--mono)", fontSize: 12.5, lineHeight: 1.55,
        outline: "none", display: "flex", flexDirection: "column", overflow: "hidden",
      }}>
      <Titlebar />
      <div ref={transcriptRef} className="scroll" style={{ flex: "1 1 60%", overflow: "auto", padding: "6px 14px", minHeight: 0 }}>
        <Transcript messages={filtered} selectedId={greenIds[selectedIdx]} expanded={expanded} />
      </div>
      <div style={{ borderTop: `1px solid #1f3028`, background: "#080d0a", flex: "1 1 40%", display: "flex", flexDirection: "column", minHeight: 0 }}>
        <TraceHeader msg={selectedMsg} />
        <div className="scroll" style={{ flex: 1, overflow: "auto", padding: "4px 14px 10px" }}>
          {selectedMsg && <CliTrace msg={selectedMsg} />}
        </div>
      </div>
      <CliStatusBar selectedMsg={selectedMsg} flash={flash} filter={filter} filterMode={filterMode} setFilter={setFilter} />
    </div>
  );
}

function Titlebar() {
  return (
    <div style={{ background: "#0c1410", borderBottom: "1px solid #1f3028", padding: "5px 14px", display: "flex", gap: 12, alignItems: "center", fontSize: 11 }}>
      <span style={{ color: CLI_GREEN, fontWeight: 600, letterSpacing: ".06em" }}>● green</span>
      <span style={{ color: CLI_DIM }}>~/code/green</span>
      <span style={{ flex: 1 }}></span>
      <span style={{ color: CLI_DIM }}>signal · linked</span>
    </div>
  );
}

function Transcript({ messages, selectedId, expanded }) {
  return (
    <>
      {messages.map((m, i) => {
        const prev = messages[i-1];
        const showDay = !prev || new Date(prev.ts).toDateString() !== new Date(m.ts).toDateString();
        return (
          <div key={m.id} data-id={m.id}>
            {showDay && (
              <div style={{ color: CLI_DIM, padding: "8px 0 2px" }}>
                ─── {fmtCliDate(m.ts)} ───
              </div>
            )}
            {m.role === "user"
              ? <CliUserLine msg={m} />
              : <CliGreenLine msg={m} active={m.id === selectedId} expanded={!!expanded[m.id]} />}
          </div>
        );
      })}
    </>
  );
}

function CliUserLine({ msg }) {
  return (
    <div style={{ padding: "6px 0 2px" }}>
      <span style={{ color: CLI_DIM }}>{fmtCliTimeFull(msg.ts)} </span>
      <span style={{ color: "#9ed1b4", fontWeight: 600 }}>YOU: </span>
      <span style={{ color: CLI_FG }}>{msg.text}</span>
    </div>
  );
}

function CliGreenLine({ msg, active, expanded }) {
  const cursor = active ? "▌" : " ";
  const headColor = active ? CLI_GREEN : "#9ed1b4";
  return (
    <div style={{ padding: "2px 0 8px", background: active ? "rgba(126,232,176,.04)" : "transparent", borderLeft: `2px solid ${active ? CLI_GREEN : "transparent"}`, paddingLeft: 8, marginLeft: -10 }}>
      <div>
        <span style={{ color: active ? CLI_GREEN : CLI_DIM }}>{cursor} </span>
        <span style={{ color: headColor, fontWeight: 600 }}>GREEN: </span>
        {msg.title && <span style={{ color: CLI_FG }}>{msg.title}</span>}
        <span style={{ color: CLI_DIM }}>  [{msg.channel === "pro" ? "pro" : "api"} · {(msg.latencyMs/1000).toFixed(1)}s · {msg.tokens.toLocaleString()}t]</span>
        {msg.bug && <span style={{ color: CLI_RED }}>  ⚑ bug</span>}
      </div>
      {(expanded || active) && (
        <div style={{ marginLeft: 0, marginTop: 2 }}>
          {msg.blocks.map((b, i) => <CliBlock key={i} b={b} />)}
        </div>
      )}
    </div>
  );
}

function CliBlock({ b }) {
  if (b.kind === "h2") return <div style={{ color: CLI_GREEN, marginTop: 6, marginBottom: 2, fontWeight: 600 }}>{b.text.toUpperCase()}</div>;
  if (b.kind === "h3") return <div style={{ color: "#5fc790", marginTop: 4, marginBottom: 2 }}>{b.text}</div>;
  if (b.kind === "p")  return <div style={{ color: CLI_FG, marginBottom: 4, whiteSpace: "pre-wrap" }}>{b.text}</div>;
  if (b.kind === "list") return (
    <div style={{ marginBottom: 4 }}>
      {b.items.map((it, i) => <div key={i}>  <span style={{ color: CLI_GREEN }}>›</span> {it}</div>)}
    </div>
  );
  if (b.kind === "kv") return (
    <div style={{ marginBottom: 4 }}>
      {b.items.map(([k, v], i) => (
        <div key={i}><span style={{ color: CLI_GREEN }}>{k}:</span> <span style={{ color: CLI_FG }}>{v}</span></div>
      ))}
    </div>
  );
  if (b.kind === "sources") return (
    <div style={{ marginTop: 4, color: CLI_DIM }}>
      Sources:{b.items.map((s, i) => <div key={i}>  - {s}</div>)}
    </div>
  );
  return null;
}

function TraceHeader({ msg }) {
  return (
    <div style={{ padding: "5px 14px", borderBottom: "1px solid #1f3028", color: CLI_DIM, display: "flex", gap: 14, fontSize: 11 }}>
      <span>── trace ──</span>
      {msg && (
        <>
          <span>{msg.cmd}</span>
          <span>{msg.trace.length} steps</span>
          <span>{(msg.latencyMs/1000).toFixed(2)}s total</span>
          <span style={{ color: msg.cost ? CLI_AMBER : CLI_DIM }}>{msg.cost ? `$${msg.cost.toFixed(4)}` : "free"}</span>
          <span>conf {msg.confidence}%</span>
        </>
      )}
    </div>
  );
}

function CliTrace({ msg }) {
  const total = msg.trace.reduce((a, t) => a + t.t, 0);
  const tierGlyph = { free: "·", pro: "+", paid: "$" };
  const tierColor = { free: CLI_GREEN, pro: CLI_AMBER, paid: "#ff8e6b" };
  return (
    <div>
      {msg.trace.map((t, i) => {
        const svc = window.GREEN_DATA.svcMap[t.svc];
        const pct = total ? Math.round(t.t / total * 30) : 0;
        const bar = "█".repeat(pct) + "░".repeat(Math.max(0, 30 - pct));
        return (
          <div key={i} style={{ marginBottom: 6 }}>
            <div>
              <span style={{ color: CLI_DIM }}>{String(i+1).padStart(2, "0")}  </span>
              <span style={{ color: tierColor[svc.tier], width: 14, display: "inline-block" }}>[{tierGlyph[svc.tier]}]</span>
              <span style={{ color: CLI_FG, fontWeight: 600 }}>{svc.name.padEnd(22, " ")}</span>
              <span style={{ color: CLI_DIM }}>{t.step}</span>
            </div>
            <div style={{ marginLeft: 18, color: CLI_DIM, fontSize: 11.5 }}>
              <span style={{ color: tierColor[svc.tier] }}>{bar}</span> {String(t.t).padStart(5, " ")}ms
              {"  "}cap: {svc.cap}
              {"  "}limit: {svc.limit}
              {"  "}risk: <span style={{ color: svc.risk === "high" ? CLI_RED : (svc.risk === "med" ? CLI_AMBER : CLI_GREEN) }}>{svc.risk}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function CliStatusBar({ selectedMsg, flash, filter, filterMode, setFilter }) {
  return (
    <div style={{ background: "#0c1410", borderTop: "1px solid #1f3028", padding: "4px 14px", display: "flex", gap: 16, alignItems: "center", fontSize: 11 }}>
      {filterMode ? (
        <>
          <span style={{ color: CLI_GREEN }}>/</span>
          <input autoFocus value={filter} onChange={e => setFilter(e.target.value)}
            style={{ flex: 1, background: "transparent", border: "none", color: CLI_FG, fontFamily: "var(--mono)", fontSize: 12, outline: "none" }} />
          <span style={{ color: CLI_DIM }}>enter / esc</span>
        </>
      ) : (
        <>
          <span style={{ color: CLI_DIM }}>j/k</span><span style={{ color: CLI_FG }}>nav</span>
          <span style={{ color: CLI_DIM }}>↵</span><span style={{ color: CLI_FG }}>expand</span>
          <span style={{ color: CLI_DIM }}>s</span><span style={{ color: CLI_FG }}>signal</span>
          <span style={{ color: CLI_DIM }}>/</span><span style={{ color: CLI_FG }}>filter</span>
          {filter && <span style={{ color: CLI_AMBER }}>["{filter}"]</span>}
          <span style={{ flex: 1 }}></span>
          {flash && <span style={{ color: CLI_GREEN }}>{flash}</span>}
          {selectedMsg && <span style={{ color: CLI_DIM }}>{selectedMsg.cmd}</span>}
        </>
      )}
    </div>
  );
}

function fmtCliTimeFull(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}, ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
}
function fmtCliDate(ts) {
  const d = new Date(ts);
  return d.toDateString();
}

window.CliDashboard = CliDashboard;

</script>

<script type="text/babel">
// Signal phone — what the user actually sees on their device.
// Renders the same conversation as a Signal-style chat: user bubbles right,
// Green replies left. New messages from the dashboard append at the bottom.

const { useEffect, useRef, useMemo } = React;

function SignalPhone({ signalApi, theme = "dark" }) {
  const data = window.GREEN_DATA;
  const baseMessages = data.conversation;

  const live = signalApi?.messages || [];
  const typing = signalApi?.typing;

  const all = useMemo(() => {
    const extra = live.map((m, i) => {
      if (m.role === "user") return { id: "live-u-"+i, role: "user", ts: m.ts, text: m.text };
      if (m.kind === "run" && m.payload) return { ...m.payload, id: "live-g-"+i, role: "green", ts: m.ts, parent: null };
      if (m.kind === "digest" && m.payload) return { id: "live-g-"+i, role: "green", ts: m.ts, cmd: "/digest",
        channel: "pro",
        title: "Digest — last 7 days",
        blocks: [
          { kind: "kv", items: [
            ["runs", String(m.payload.stats?.total ?? "—")],
            ["ok", String(m.payload.stats?.ok ?? "—")],
            ["tokens", (m.payload.stats?.tokens ?? 0).toLocaleString()],
          ] },
        ],
        latencyMs: 800, tokens: 240, confidence: 92, cost: 0,
        trace: [{ svc: "claude-pro", step: "build digest", t: 800, tokens: 240 }],
      };
      return null;
    }).filter(Boolean);
    return [...baseMessages, ...extra];
  }, [baseMessages, live]);

  const scrollRef = useRef(null);
  useEffect(() => {
    const el = scrollRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }, [all.length, typing]);

  const dark = theme !== "light";
  const C = dark
    ? { bg: "#0a0f0c", card: "#11201a", line: "#1f3028", ink: "#e8f5ec", dim: "#7a8e82", out: "#2d6a4a", outInk: "#c8ffdd", in: "#1a2820", inInk: "#e8f5ec" }
    : { bg: "#f4faf6", card: "#ffffff", line: "#dbe7e0", ink: "#0a0f0c", dim: "#5b7768", out: "#3fb87a", outInk: "#06120a", in: "#e6f1ea", inInk: "#0a0f0c" };

  return (
    <div style={{
      width: 340, height: 700, borderRadius: 38, background: "#000",
      padding: 8, boxShadow: "0 30px 80px rgba(0,0,0,.6), 0 0 0 1px #222 inset",
      position: "relative",
    }}>
      <div style={{
        width: "100%", height: "100%", background: C.bg, borderRadius: 32, overflow: "hidden",
        display: "flex", flexDirection: "column", color: C.ink, fontFamily: "var(--sans)",
      }}>
        {/* status bar */}
        <div style={{ height: 28, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 22px", fontFamily: "var(--mono)", fontSize: 11, color: C.ink }}>
          <span>2:31</span>
          <span style={{ width: 80, height: 18, background: "#000", borderRadius: 12 }}></span>
          <span>●●●●●</span>
        </div>
        {/* nav header */}
        <div style={{ padding: "8px 14px", borderBottom: `1px solid ${C.line}`, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ color: C.dim, fontSize: 18 }}>‹</span>
          <div style={{ width: 32, height: 32, borderRadius: "50%", background: "var(--g-3)", display: "flex", alignItems: "center", justifyContent: "center", color: "#06120a", fontFamily: "var(--mono)", fontWeight: 700 }}>g</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Green</div>
            <div style={{ fontSize: 11, color: C.dim, fontFamily: "var(--mono)" }}>signal-cli · localhost</div>
          </div>
          <span style={{ color: C.dim, fontSize: 16 }}>⋯</span>
        </div>
        {/* messages */}
        <div ref={scrollRef} className="scroll" style={{ flex: 1, overflow: "auto", padding: "12px 10px", display: "flex", flexDirection: "column", gap: 8 }}>
          {all.map((m, i) => {
            const prev = all[i-1];
            const showDay = !prev || new Date(prev.ts).toDateString() !== new Date(m.ts).toDateString();
            return (
              <React.Fragment key={m.id}>
                {showDay && <SDay ts={m.ts} C={C} />}
                {m.role === "user" ? <SUser msg={m} C={C} /> : <SGreen msg={m} C={C} />}
              </React.Fragment>
            );
          })}
          {typing && <STyping C={C} />}
        </div>
        {/* composer */}
        <div style={{ padding: "8px 12px", borderTop: `1px solid ${C.line}`, display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ flex: 1, height: 32, borderRadius: 16, background: dark ? "#1a2820" : "#e6f1ea", display: "flex", alignItems: "center", padding: "0 12px", color: C.dim, fontFamily: "var(--mono)", fontSize: 12 }}>
            Signal message
          </div>
          <div style={{ width: 32, height: 32, borderRadius: "50%", background: "var(--g-3)", display: "flex", alignItems: "center", justifyContent: "center", color: "#06120a" }}>↑</div>
        </div>
        {/* home indicator */}
        <div style={{ height: 18, display: "flex", justifyContent: "center", alignItems: "center" }}>
          <div style={{ width: 110, height: 4, borderRadius: 2, background: dark ? "#2c3a32" : "#aebcb3" }}></div>
        </div>
      </div>
    </div>
  );
}

function SDay({ ts, C }) {
  const d = new Date(ts);
  return (
    <div style={{ alignSelf: "center", color: C.dim, fontFamily: "var(--mono)", fontSize: 10, padding: "4px 0" }}>
      {d.toDateString()}
    </div>
  );
}

function SUser({ msg, C }) {
  return (
    <div style={{ alignSelf: "flex-end", maxWidth: "82%" }}>
      <div style={{ background: C.out, color: C.outInk, padding: "7px 11px", borderRadius: "16px 16px 4px 16px", fontFamily: "var(--mono)", fontSize: 12.5, lineHeight: 1.4, wordBreak: "break-word" }}>
        {msg.text}
      </div>
      <div style={{ fontSize: 9.5, color: C.dim, textAlign: "right", marginTop: 2, fontFamily: "var(--mono)" }}>{fmtSTime(msg.ts)} ✓✓</div>
    </div>
  );
}

function SGreen({ msg, C }) {
  return (
    <div style={{ alignSelf: "flex-start", maxWidth: "88%" }}>
      <div style={{ background: C.in, color: C.inInk, padding: "8px 11px", borderRadius: "16px 16px 16px 4px", fontSize: 12.5, lineHeight: 1.45 }}>
        {msg.title && <div style={{ fontFamily: "var(--mono)", fontSize: 12.5, fontWeight: 700, color: "var(--g-5)", marginBottom: 4 }}>{msg.title}</div>}
        {(msg.blocks || []).slice(0, 4).map((b, i) => <SBlock key={i} b={b} C={C} />)}
        {msg.blocks && msg.blocks.length > 4 && <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: C.dim, marginTop: 4 }}>… {msg.blocks.length - 4} more</div>}
      </div>
      <div style={{ fontSize: 9.5, color: C.dim, marginTop: 2, marginLeft: 4, fontFamily: "var(--mono)" }}>
        {fmtSTime(msg.ts)} · {msg.channel === "pro" ? "pro" : "api"} · {(msg.latencyMs/1000).toFixed(1)}s
      </div>
    </div>
  );
}

function SBlock({ b, C }) {
  if (b.kind === "h2") return <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--g-4)", textTransform: "uppercase", letterSpacing: ".1em", marginTop: 6, marginBottom: 2 }}>{b.text}</div>;
  if (b.kind === "h3") return <div style={{ fontFamily: "var(--mono)", fontSize: 10.5, color: "var(--g-4)", textTransform: "uppercase", letterSpacing: ".1em", marginTop: 4, marginBottom: 2 }}>{b.text}</div>;
  if (b.kind === "p")  return <div style={{ marginBottom: 4, fontFamily: "var(--mono)" }}>{b.text}</div>;
  if (b.kind === "list") return (
    <div style={{ marginBottom: 4, fontFamily: "var(--mono)" }}>
      {b.items.slice(0, 4).map((it, i) => <div key={i}><span style={{ color: "var(--g-4)" }}>›</span> {it}</div>)}
    </div>
  );
  if (b.kind === "kv") return (
    <div style={{ marginBottom: 4, fontFamily: "var(--mono)" }}>
      {b.items.slice(0, 6).map(([k, v], i) => (
        <div key={i}><span style={{ color: "var(--g-4)" }}>{k}:</span> {v}</div>
      ))}
    </div>
  );
  if (b.kind === "sources") return (
    <div style={{ marginTop: 4, fontFamily: "var(--mono)", fontSize: 10.5, color: C.dim }}>
      {b.items.length} source{b.items.length !== 1 ? "s" : ""}
    </div>
  );
  return null;
}

function STyping({ C }) {
  return (
    <div style={{ alignSelf: "flex-start", background: C.in, color: C.dim, padding: "8px 12px", borderRadius: "16px 16px 16px 4px", fontFamily: "var(--mono)", fontSize: 12 }}>
      green is typing<span style={{ animation: "blink 1.2s infinite" }}>…</span>
    </div>
  );
}

function fmtSTime(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  const hh = ((h + 11) % 12) + 1;
  return `${hh}:${String(m).padStart(2, "0")} ${ampm}`;
}

window.SignalPhone = SignalPhone;

</script>

<script type="text/babel">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',
      fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
      fontSize: 14, lineHeight: 1.4, color: DC.postitText,
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
